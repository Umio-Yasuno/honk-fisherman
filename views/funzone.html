{{ template "header.html" . }}
<main>
  <div class="info">
    <h2>Welcome the fun zone!</h2>
  </div>
  <ul>
    {{ $m := .Emuext }}
    {{- range .Emus -}}
      <li><img class="emu" src="/emu/{{ . }}{{ index $m . }}"> :{{ . }}:
    {{- end }}
  </ul>
  <ul>
    {{- range .Memes -}}
      <li>meme: <a href="/meme/{{ . }}">{{ . }}</a>
    {{- end }}
  </ul>
</main>
